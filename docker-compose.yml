services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: running-crew-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/running_crew
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - running-crew-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: running-crew-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - running-crew-network

  postgres:
    image: postgres:16
    container_name: running-crew-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: running_crew
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - running-crew-network

  redis:
    image: redis:7-alpine
    container_name: running-crew-redis
    ports:
      - "6379:6379"
    networks:
      - running-crew-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: running-crew-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    networks:
      - running-crew-network

volumes:
  postgres_data:

networks:
  running-crew-network:
    driver: bridge